<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbershop Booking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a6cf7">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
</head>

<body>
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <h1>Barbershop Booking</h1>
            <div class="user-info" id="userInfo">
                <!-- User info will be inserted here -->
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Auth Section -->
            <section id="authSection" class="section">
                <h2>Login</h2>
                <div id="authMethods">
                    <button id="googleLogin" class="btn btn-primary">
                        Login with Google
                    </button>
                </div>
                <p id="authStatus" class="status"></p>
            </section>

            <!-- Booking Section (hidden until logged in) -->
            <section id="bookingSection" class="section hidden">
                <h2>Book an Appointment</h2>
                <form id="bookingForm">
                    <div class="form-group">
                        <label for="customerName">Nama Lengkap</label>
                        <input type="text" id="customerName" required>
                    </div>
                    <div class="form-group">
                        <label for="phoneNumber">Nomor Telepon</label>
                        <input type="tel" id="phoneNumber" required>
                    </div>
                    <div class="form-group">
                        <label for="service">Layanan</label>
                        <select id="service" required>
                            <option value="">-- Pilih Layanan --</option>
                            <option value="haircut">Potong Rambut</option>
                            <option value="shave">Goyang</option>
                            <option value="beard">Perawatan Jenggot</option>
                            <option value="package">Paket Lengkap</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="date">Tanggal</label>
                        <input type="date" id="date" min="" required>
                    </div>
                    <div class="form-group">
                        <label for="time">Waktu</label>
                        <select id="time" required>
                            <option value="">-- Pilih Waktu --</option>
                            <!-- Time slots will be populated dynamically -->
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Buat Janji Temu</button>
                </form>
                <div id="bookingStatus" class="status"></div>
            </section>

            <!-- My Bookings Section (hidden until logged in) -->
            <section id="myBookingsSection" class="section hidden">
                <h2>Janji Temu Saya</h2>
                <div id="bookingsList" class="bookings-list">
                    <!-- Bookings will be listed here -->
                </div>
                <button id="refreshBookings" class="btn btn-secondary">Segarkan</button>
            </section>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>&copy; <span id="year"></span> Barbershop Booking. All rights reserved.</p>
        </footer>
    </div>

    <!-- Firebase App -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <!-- Our scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/booking.js"></script>
</body>

</html>
