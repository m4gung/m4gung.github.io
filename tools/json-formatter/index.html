<!DOCTYPE html>
<html lang="id" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern JSON Formatter & Validator</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="logo">
            <h1>{ } JSON Master</h1>
        </div>
        <div class="header-right">
            <div id="statusIndicator" class="status-badge">Menunggu Input...</div>
            <button id="themeToggle" class="btn icon-btn" title="Ubah Tema">☀️</button>
        </div>
    </header>

    <main class="workspace">
        <div class="pane">
            <div class="pane-toolbar">
                <span class="pane-title">Input</span>
                <div class="btn-group">
                    <button id="pasteBtn" class="btn">Paste</button>
                    <button id="loadBtn" class="btn">Load JSON</button>
                    <button id="clearBtn" class="btn danger">Clear</button>
                </div>
                <input type="file" id="fileInput" accept=".json, application/json" style="display: none;">
            </div>
            <textarea id="jsonInput" spellcheck="false"
                placeholder="Paste atau Load file JSON mentah di sini..."></textarea>
        </div>

        <div class="pane">
            <div class="pane-toolbar">
                <span class="pane-title">Output</span>
                <div class="btn-group">
                    <button id="formatBtn" class="btn primary">Format</button>
                    <button id="minifyBtn" class="btn">Remove Whitespace</button>
                    <button id="copyBtn" class="btn success">Copy</button>
                </div>
            </div>
            <textarea id="jsonOutput" spellcheck="false" readonly placeholder="Hasil akan muncul di sini..."></textarea>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
