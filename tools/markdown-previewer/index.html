<!DOCTYPE html>
<html lang="id" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Markdown Previewer</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css"> -->
    <link id="hljsTheme" rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/split.js/1.6.5/split.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="logo">
            <h1>📝 MDPreview</h1>
        </div>
        <div class="header-actions">
            <button id="pdfBtn" class="btn primary">Export PDF</button>
            <button id="clearBtn" class="btn danger">Bersihkan</button>
            <button id="themeToggle" class="btn icon-btn" title="Ubah Tema">☀️</button>
        </div>
    </header>

    <main class="workspace">
        <div id="input-pane" class="pane">
            <textarea id="mdInput" spellcheck="false" placeholder="Ketik Markdown di sini..."></textarea>
        </div>

        <div id="output-pane" class="pane">
            <div id="mdOutput" class="markdown-body"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
