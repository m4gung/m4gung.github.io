<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6efd">
    <meta name="description" content="Aplikasi Penjualan dengan Google Sheets Sync">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Penjualan">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <title id="title-text-head">USAHA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-active { color: #2563eb; border-top: 3px solid #2563eb; background: #f0f7ff; }
        .page { display: none; }
        .page.active { display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-slate-50 pb-20 text-slate-800">

    <header class="bg-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center border-b">
        <h1 id="title-text" class="font-black text-blue-600 italic tracking-tighter uppercase">USAHA</h1>
        <div id="status-badge" class="px-2 py-1 rounded text-[9px] font-bold bg-green-100 text-green-600 tracking-widest uppercase">Online</div>
    </header>

    <main class="w-full mx-auto p-4 md:max-w-3xl lg:max-w-5xl">
        <section id="pengaturan" class="page active">
            <div class="bg-white p-4 sm:p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xs sm:text-[10px] md:text-sm font-black text-slate-400 uppercase mb-4 tracking-widest">⚙️ Konfigurasi</h2>
                <input type="text" id="app-name-input" class="w-full p-2 border-b-2 mb-6 outline-none font-bold text-blue-600 focus:border-blue-500 transition-all">
                <div class="mb-4">
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1 block mb-2">API URL (Google Script)</label>
                    <input type="text" id="api-url-input" class="w-full p-2 border-2 border-slate-100 rounded-xl outline-none font-mono text-[10px] text-slate-600 focus:border-blue-500 transition-all" placeholder="https://script.google.com/...">
                </div>
                <div id="col-list" class="space-y-3"></div>
                <button onclick="addCol()" class="w-full py-3 mt-4 border-2 border-dashed border-slate-200 text-slate-400 rounded-xl text-[10px] font-bold uppercase tracking-widest">+ Tambah Kolom</button>
                <button onclick="saveSettings()" class="w-full bg-blue-600 text-white mt-8 py-4 rounded-xl font-bold shadow-lg shadow-blue-100 active:scale-95 transition">SIMPAN PENGATURAN</button>
            </div>
        </section>

        <section id="input" class="page">
            <div class="bg-white p-4 sm:p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xs sm:text-[10px] md:text-sm font-black text-blue-600 uppercase mb-6 tracking-widest">📝 Form Input</h2>
                <div id="form-container" class="space-y-5"></div>
                <button id="btn-submit" onclick="submitData()" class="w-full bg-slate-900 text-white mt-8 py-4 rounded-xl font-bold uppercase tracking-widest active:scale-95 transition">Kirim Data</button>
            </div>
        </section>

        <section id="output" class="page">
            <div class="bg-white p-4 md:p-6 lg:p-8 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4 sm:mb-6">
                    <h2 class="text-xs sm:text-[10px] md:text-sm font-black text-slate-400 uppercase tracking-widest">📋 Database</h2>
                    <button onclick="fetchCloud()" class="text-blue-500 text-[10px] sm:text-xs md:text-sm font-black uppercase hover:text-blue-600 transition-colors">Sync Cloud</button>
                </div>
                <div class="flex flex-wrap gap-2 mb-4 items-center">
                    <span class="text-[10px] font-black text-slate-400 uppercase">Filter:</span>
                    <input type="date" id="filter-start" class="text-xs border border-slate-200 rounded-lg px-2 py-1.5 outline-none focus:border-blue-500" onchange="applyFilter()">
                    <span class="text-[10px] text-slate-400">-</span>
                    <input type="date" id="filter-end" class="text-xs border border-slate-200 rounded-lg px-2 py-1.5 outline-none focus:border-blue-500" onchange="applyFilter()">
                    <button onclick="clearFilter()" class="text-[10px] font-black text-red-400 uppercase ml-2 hover:text-red-500">Clear</button>
                    <span id="filter-count" class="text-[10px] text-slate-400 ml-auto"></span>
                </div>
                <div class="overflow-x-auto rounded-lg -mx-4 px-4 sm:mx-0 sm:px-0">
                    <table class="w-full text-xs sm:text-sm md:text-base">
                        <thead><tr id="thr" class="bg-slate-50 text-left text-[10px] sm:text-[10px] md:text-xs text-slate-400 uppercase tracking-tighter"></tr></thead>
                        <tbody id="tbd" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div id="editModal" class="modal p-4 sm:p-6 md:p-10">
        <div class="bg-white w-full max-w-full sm:max-w-lg md:max-w-2xl p-6 sm:p-8 rounded-2xl shadow-2xl border transition-all">
            
            <h3 class="font-black text-blue-600 uppercase text-xs sm:text-sm mb-6 tracking-widest text-center sm:text-left">
                Edit Entry
            </h3>
            
            <div id="edit-fields" class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6 mb-8">
                </div>
            
            <div class="flex flex-col-reverse sm:flex-row gap-3 sm:gap-4 justify-end">
                <button onclick="closeEdit()" class="flex-1 sm:flex-initial px-6 py-3 bg-slate-100 rounded-xl font-bold text-xs uppercase tracking-widest active:scale-95 transition">
                    Batal
                </button>
                <button onclick="saveEdit()" class="flex-1 sm:flex-initial px-8 py-3 bg-blue-600 text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-blue-100 active:scale-95 transition">
                    Update
                </button>
            </div>
        </div>
    </div>
    

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-1 shadow-[0_-5px_15px_rgba(0,0,0,0.02)] z-50">
        <button onclick="nav('pengaturan')" class="nav-btn flex-1 py-2 flex flex-col items-center text-[9px] font-black nav-active uppercase tracking-tighter" id="n-pengaturan"><span>⚙️</span>SET</button>
        <button onclick="nav('input')" class="nav-btn flex-1 py-2 flex flex-col items-center text-[9px] font-black text-slate-300 uppercase tracking-tighter" id="n-input"><span>📝</span>IN</button>
        <button onclick="nav('output')" class="nav-btn flex-1 py-2 flex flex-col items-center text-[9px] font-black text-slate-300 uppercase tracking-tighter" id="n-output"><span>📋</span>OUT</button>
    </nav>

    <script>
        let config = JSON.parse(localStorage.getItem('m_cfg')) || { name: "USAHA", cols: [{n: "Nama", t: "text"}], apiUrl: "" };
        let db, currentEditTs = null;
        let allData = [];

        const dbReq = indexedDB.open("AplikasiPWA", 1);
        dbReq.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("data", { keyPath: "Timestamp" });
        };
        dbReq.onsuccess = e => { db = e.target.result; refreshUI(); fetchCloud(); };

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active', 'text-slate-300'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-'+id).classList.add('nav-active');
            if(id === 'input') renderForm();
            if(id === 'output') refreshUI();
        }

        function renderSettings() {
            document.getElementById('app-name-input').value = config.name;
            document.getElementById('api-url-input').value = config.apiUrl || '';
            document.getElementById('title-text').innerText = config.name;
            document.getElementById('title-text-head').innerText = config.name;
            document.getElementById('col-list').innerHTML = config.cols.map((c, i) => `
                <div class="flex gap-2 bg-slate-50 p-2 rounded-xl border border-slate-200">
                    <input type="text" value="${c.n}" onchange="config.cols[${i}].n=this.value" class="flex-1 bg-transparent text-sm font-bold outline-none">
                    <select onchange="config.cols[${i}].t=this.value" class="text-[10px] bg-white border rounded px-1 font-bold">
                        <option value="text" ${c.t=='text'?'selected':''}>Teks</option>
                        <option value="date" ${c.t=='date'?'selected':''}>Tgl</option>
                        <option value="number" ${c.t=='number'?'selected':''}>No</option>
                    </select>
                    <button onclick="config.cols.splice(${i},1); renderSettings();" class="text-red-400 px-2 font-black text-lg">&times;</button>
                </div>
            `).join('');
        }
        function addCol() { config.cols.push({n: "Kolom", t: "text"}); renderSettings(); }
        function saveSettings() { 
            const titleName = document.getElementById('app-name-input').value;
            const apiUrl = document.getElementById('api-url-input').value.trim();
            config.name = titleName;
            config.apiUrl = apiUrl;
            localStorage.setItem('m_cfg', JSON.stringify(config)); alert("Tersimpan!"); renderSettings(); 
        }

        function renderForm() {
            document.getElementById('form-container').innerHTML = config.cols.map(c => `
                <div><label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">${c.n}</label>
                <input type="${c.t}" data-key="${c.n}" class="in-val w-full p-3 border-2 border-slate-50 rounded-xl bg-slate-50 outline-none focus:bg-white focus:border-blue-500 transition-all"></div>
            `).join('');
        }

        async function submitData() {
            const timestamp = new Date().toISOString();
            const id = "ID-" + Date.now() + Math.random().toString(36).substr(2, 5); // ID Unik
            const payload = { "id": id, "Timestamp": timestamp, "mode": "UPSERT" };
            
            document.querySelectorAll('.in-val').forEach(i => payload[i.dataset.key] = i.value);
            
            const tx = db.transaction("data", "readwrite");
            tx.objectStore("data").add(payload);
            tx.oncomplete = () => {
                nav('output');
                // Kirim ke cloud jika online
                if(config.apiUrl && navigator.onLine) {
                    fetch(config.apiUrl, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        body: JSON.stringify(payload) 
                    });
                }
            };
        }


        function refreshUI() {
            if(!db) return;
            db.transaction("data").objectStore("data").getAll().onsuccess = e => {
                allData = e.target.result.reverse();
                applyFilter();
            };
        }

        // Update fungsi applyFilter untuk formatting tampilan
        function applyFilter() {
            const startDate = document.getElementById('filter-start').value;
            const endDate = document.getElementById('filter-end').value;
            
            let filtered = allData;
            if(startDate || endDate) {
                filtered = allData.filter(r => {
                    const itemDateStr = formatDate(r.Timestamp);
                    if(startDate && itemDateStr < startDate) return false;
                    if(endDate && itemDateStr > endDate) return false;
                    return true;
                });
            }
            
            document.getElementById('filter-count').textContent = filtered.length !== allData.length ? `${filtered.length} / ${allData.length} data` : '';
            
            if(filtered.length === 0) {
                document.getElementById('tbd').innerHTML = '<tr><td colspan="100" class="p-8 text-center text-slate-400 text-sm">Tidak ada data</td></tr>';
                return;
            }

            const keys = Object.keys(filtered[0]).filter(k => k !== "Timestamp" && k !== "id" && k !== "mode");
            document.getElementById('thr').innerHTML = `<th class="p-3 border-b">Waktu</th>` + keys.map(k => `<th class="p-3 border-b">${k}</th>`).join('') + `<th class="p-3 border-b text-right">Aksi</th>`;
            
            document.getElementById('tbd').innerHTML = filtered.map(r => {
                // Cek apakah key adalah 'Jumlah' atau mengandung unsur angka untuk diformat
                return `
                    <tr class="hover:bg-slate-50 font-medium text-[11px] sm:text-xs">
                        <td class="p-3 border-b text-slate-400">${formatDate(r.Timestamp)}</td>
                        ${keys.map(k => {
                            let displayVal = r[k] || '-';
                            // Jika kolom adalah 'Jumlah' atau bertipe number di config, beri format ribuan
                            const colCfg = config.cols.find(c => c.n === k);
                            if(colCfg && colCfg.t === 'number') displayVal = formatNumber(displayVal);
                            // Jika kolom bertipe date, pastikan format YYYY-MM-DD
                            if(colCfg && colCfg.t === 'date') displayVal = formatDate(displayVal);
                            
                            return `<td class="p-3 border-b whitespace-nowrap">${displayVal}</td>`;
                        }).join('')}
                        <td class="p-3 border-b whitespace-nowrap text-right">
                            <button onclick="openEdit('${r.Timestamp}')" class="text-blue-500 font-black uppercase mr-3">Edit</button>
                            <button onclick="deleteData('${r.Timestamp}')" class="text-red-400 font-black uppercase">Hapus</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function clearFilter() {
            document.getElementById('filter-start').value = '';
            document.getElementById('filter-end').value = '';
            applyFilter();
        }

        async function deleteData(ts) {
            if(!confirm("Hapus data ini?")) return;
            const tx = db.transaction("data", "readwrite");
            const store = tx.objectStore("data");
            store.get(ts).onsuccess = e => {
                const item = e.target.result;
                const deletePayload = { mode: "DELETE", id: item?.id, timestamp: ts };
                store.delete(ts);
                tx.oncomplete = () => {
                    refreshUI();
                    if(config.apiUrl) fetch(config.apiUrl, { method: 'POST', body: JSON.stringify(deletePayload) });
                };
            };
        }

        function openEdit(ts) {
            currentEditTs = ts;
            db.transaction("data").objectStore("data").get(ts).onsuccess = e => {
                const item = e.target.result;
                document.getElementById('edit-fields').innerHTML = config.cols.map(c => {
                    let val = item[c.n] || '';
                    // KHUSUS: Jika tipe input adalah date, pastikan formatnya YYYY-MM-DD agar muncul di form
                    if (c.t === 'date') {
                        val = formatDate(val);
                    }
                    
                    return `
                        <div>
                            <label class="text-[9px] uppercase font-black text-slate-400 tracking-widest">${c.n}</label>
                            <input type="${c.t}" id="edit-${c.n}" value="${val}" class="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-blue-500">
                        </div>
                    `;
                }).join('');
                document.getElementById('editModal').classList.add('active');
            };
        }


        function closeEdit() { document.getElementById('editModal').classList.remove('active'); }

        async function saveEdit() {
            const tx = db.transaction("data", "readwrite");
            const store = tx.objectStore("data");

            store.get(currentEditTs).onsuccess = e => {
            const item = e.target.result;
            config.cols.forEach(c => {
                item[c.n] = document.getElementById(`edit-${c.n}`).value;
            });
            item.mode = "UPSERT"; // Sesuai dengan logika di Code.gs

            store.put(item);
            tx.oncomplete = () => {
                closeEdit(); 
                refreshUI();
                if(config.apiUrl) {
                    fetch(config.apiUrl, { 
                        method: 'POST', 
                        mode: 'no-cors', // Penting untuk menghindari error CORS Google Script
                        body: JSON.stringify(item) 
                    });
                }
            };
            };
        }


        async function fetchCloud() {
            if (!navigator.onLine || !config.apiUrl) return;

            try {
                const res = await fetch(config.apiUrl);
                const rawData = await res.json(); //[span_1](start_span)// Mengambil data dari doGet[span_1](end_span)

                if (!rawData || rawData.length <= 1) return; // Kosong atau hanya header

                const headers = rawData[0];
                const cloudData = rawData.slice(1).map(row => {
                    let obj = {};
                    headers.forEach((h, i) => obj[h] = row[i]);
                    return obj;
                });

                const tx = db.transaction("data", "readwrite");
                const store = tx.objectStore("data");

                // Ambil ID lokal untuk perbandingan
                const localData = await new Promise(resolve => {
                    store.getAll().onsuccess = e => resolve(e.target.result);
                });
                const localIds = new Set(localData.map(d => d.id));

                cloudData.forEach(cloudItem => {
                    // Jika ID di Cloud belum ada di Local, atau data di Cloud lebih baru (berdasarkan Timestamp)
                    // Di sini kita pakai logika: Cloud adalah sumber kebenaran (Source of Truth)
                    if (cloudItem.id) {
                        store.put(cloudItem); // .put akan menambah jika baru, menimpa jika ID sama
                    }
                });

                tx.oncomplete = () => {
                    console.log("Sync Berhasil");
                    refreshUI();
                };

            } catch (e) {
                console.error('Gagal memuat data dari Cloud:', e);
            }
        }


        window.addEventListener('online', () => { document.getElementById('status-badge').innerText = "Online"; document.getElementById('status-badge').className = "px-2 py-1 rounded text-[9px] font-bold bg-green-100 text-green-600 tracking-widest uppercase"; if(config.apiUrl) fetchCloud(); });
        window.addEventListener('offline', () => { document.getElementById('status-badge').innerText = "Offline"; document.getElementById('status-badge').className = "px-2 py-1 rounded text-[9px] font-bold bg-red-100 text-red-600 tracking-widest uppercase"; });
        
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
        renderSettings();

        // Fungsi Helper untuk format angka ribuan
        function formatNumber(val) {
            if (!val || isNaN(val)) return val;
            return new Intl.NumberFormat('id-ID').format(val);
        }

        // Fungsi Helper untuk memastikan format YYYY-MM-DD
        function formatDate(dateInput) {
            if (!dateInput) return "";
            const d = new Date(dateInput);
            if (isNaN(d.getTime())) return dateInput; // Kembalikan asli jika gagal parse
            return d.toISOString().split('T')[0];
        }

    </script>
</body>
</html>
