    <title>URL Viewer - Anti Iklan</title>

            -webkit-backdrop-filter: blur(16px);

<body class="min-h-screen flex flex-col">
    <header class="pt-6 pb-4 px-4">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <a href="index.html" class="text-blue-400 hover:text-blue-300 text-sm">← Kembali</a>
            <h1 class="text-xl font-bold">URL Viewer</h1>
            <div class="w-20"></div>
        </div>
    </header>

    <main class="flex-grow px-4 pb-8">
        <div class="max-w-5xl mx-auto">
            <div class="glass-card p-4 rounded-2xl mb-6">
                <div class="flex gap-3">
                    <input type="text" id="urlInput" 
                        class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500"
                        placeholder="Masukkan URL (contoh: youtube.com)" />
                    <button onclick="loadUrl()" 
                        class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-lg font-semibold transition-colors">
                        Buka
                    </button>
                </div>
                <p class="text-xs text-slate-500 mt-2">
                    Catatan: Browser tidak bisa sepenuhnya blokir iklan karena security. Install ekstensi <strong>uBlock Origin</strong> untuk hasil maksimal.
                </p>
            </div>

            <div class="glass-card rounded-2xl overflow-hidden border-slate-700 relative">
                <iframe id="viewer" frameborder="0" 
                    sandbox="allow-scripts allow-same-origin"
                    class="w-full h-[70vh] bg-white"></iframe>
            </div>
        </div>
    </main>

    <script>
        function loadUrl() {
            let url = document.getElementById('urlInput').value.trim();
            if (!url) return;
            
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            localStorage.setItem('lastUrl', url);
            document.getElementById('viewer').src = url;
        }

        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') loadUrl();
        });

        // Detect and block popups
        window.addEventListener('blur', function() {
            setTimeout(function() {
                if (document.activeElement && document.activeElement.tagName === 'IFRAME') {
                    const iframe = document.getElementById('viewer');
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    
                    // Inject popup blocker script
                    try {
                        const blockerScript = iframeDoc.createElement('script');
                        blockerScript.textContent = `
                            // Block popups
                            window.open = function() { return null; };
                            
                            // Block new window creation
                            const originalWindowOpen = window.open;
                            window.open = function() { return null; };
                            
                            // Remove common ad containers
                            setInterval(function() {
                                const adSelectors = [
                                    '.adsbygoogle', 
                                    '[id*="google_ads"]', 
                                    '[id*="adsense"]',
                                    '.ad-container',
                                    '.advertisement',
                                    '[class*="ad-"]'
                                ];
                                adSelectors.forEach(selector => {
                                    document.querySelectorAll(selector).forEach(el => el.remove());
                                });
                            }, 1000);
                        `;
                        iframe.contentWindow.document.head.appendChild(blockerScript);
                    } catch(e) {}
                }
            }, 100);
        });

        const lastUrl = localStorage.getItem('lastUrl');
        if (lastUrl) {
            document.getElementById('urlInput').value = lastUrl;
            document.getElementById('viewer').src = lastUrl;
        }
    </script>
</body>
