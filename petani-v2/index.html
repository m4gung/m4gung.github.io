<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaniPintar V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#15803d">
    <style>
        .active-tab {
            color: #15803d;
            border-top: 3px solid #15803d;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }

        body {
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 70px;
        }
    </style>
</head>

<body class="bg-gray-50">

    <header class="bg-green-700 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <h1 class="text-lg font-bold">TaniPintar 🌾</h1>
            <span id="online-status" class="w-2 h-2 rounded-full bg-green-400 border border-white/20"></span>
        </div>
        <button onclick="syncData()" id="sync-btn"
            class="text-xs bg-green-800 px-3 py-1 rounded-full transition-all active:scale-95">Sync Cloud</button>
    </header>

    <div id="app" class="max-w-md mx-auto">

        <section id="sec-home" class="p-4 space-y-4">
            <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100">
                <p class="text-xs text-gray-500 mb-2">Filter Tanggal</p>
                <div class="flex gap-2">
                    <div class="w-1/2">
                        <input type="date" id="filter-start" class="w-full p-2 border rounded text-xs text-gray-600"
                            onchange="refreshDashboard()">
                    </div>
                    <div class="w-1/2">
                        <input type="date" id="filter-end" class="w-full p-2 border rounded text-xs text-gray-600"
                            onchange="refreshDashboard()">
                    </div>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 text-center">
                <h3 class="text-gray-500 text-sm">Total Keuntungan</h3>
                <p id="total-profit" class="text-2xl font-bold text-green-600">Rp 0</p>
            </div>
            <canvas id="profitChart" class="bg-white p-2 rounded-xl shadow-sm"></canvas>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="showSectionTransaksi('keluar')"
                    class="bg-red-500 text-white p-4 rounded-xl shadow-md font-bold">📉 Catat Keluar</button>
                <button onclick="showSectionTransaksi('masuk')"
                    class="bg-green-600 text-white p-4 rounded-xl shadow-md font-bold">📈 Catat Masuk</button>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mt-4">
                <h3 class="font-bold text-gray-700 mb-3">Riwayat Transaksi</h3>
                <div id="list-transaksi-beranda" class="space-y-2">
                    <p class="text-xs text-gray-500 italic">Belum ada transaksi</p>
                </div>
            </div>
        </section>

        <section id="sec-lahan" class="hidden p-4">
            <h2 class="font-bold mb-4">Manajemen Lahan</h2>
            <form id="form-lahan" class="bg-white p-4 rounded-xl shadow-sm space-y-3 mb-4">
                <input type="hidden" id="lahan-edit-id">
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Nama Lahan</label>
                    <input type="text" id="nama-lahan" placeholder="Contoh: Sawah Barat"
                        class="w-full p-2 border rounded" required>
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Luas Lahan (are)</label>
                    <input type="text" id="luas-lahan" placeholder="Contoh: 50"
                        class="w-full p-2 border rounded"
                        oninput="formatRupiah(this)" required>
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Lokasi Lahan</label>
                    <input type="text" id="lokasi-lahan" placeholder="Contoh: Ds. Sukatani"
                        class="w-full p-2 border rounded"
                        required>
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Status</label>
                    <select id="status-lahan" class="w-full p-2 border rounded">
                        <option value="milik">Milik Sendiri</option>
                        <option value="buruh">Garapan (Bagi Hasil)</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <button type="submit" id="btn-save-lahan"
                        class="flex-1 bg-green-600 text-white py-2 rounded-lg">Tambah Lahan</button>
                    <button type="button" onclick="batalEditLahan()" id="btn-cancel-lahan"
                        class="hidden flex-1 bg-gray-500 text-white py-2 rounded-lg">Batal Edit</button>
                </div>
            </form>
            <div id="list-lahan" class="space-y-2"></div>
        </section>

        <section id="sec-transaksi" class="hidden p-4">
            <h2 class="font-bold mb-4">Input Keuangan</h2>
            <form id="form-transaksi" class="bg-white p-4 rounded-xl shadow-sm space-y-3">
                <input type="hidden" id="trans-edit-id">
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Pilih Lahan</label>
                    <select id="lahan-id" class="w-full p-2 border rounded"></select>
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Tanggal</label>
                    <input type="date" id="trans-date" class="w-full p-2 border rounded" required>
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Keterangan</label>
                    <input type="text" id="trans-desc" placeholder="Contoh: Beli Bibit, Jual Panen Padi"
                        class="w-full p-2 border rounded" required>
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Jumlah (Rp)</label>
                    <input type="text" id="trans-amount" placeholder="Contoh: 500.000"
                        class="w-full p-2 border rounded"
                        oninput="formatRupiah(this)" required>
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Jenis Transaksi</label>
                    <select id="trans-type" class="w-full p-2 border rounded">
                        <option value="keluar">Pengeluaran (Modal)</option>
                        <option value="masuk">Pemasukan (Hasil Tani)</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <button type="submit" id="btn-save-trans"
                        class="flex-1 bg-green-600 text-white py-2 rounded-lg">Simpan Transaksi</button>
                    <button type="button" onclick="batalEditTransaksi()" id="btn-cancel-trans"
                        class="hidden flex-1 bg-gray-500 text-white py-2 rounded-lg">Batal Edit</button>
                </div>
            </form>
            <div id="list-transaksi" class="space-y-2 mt-4"></div>
        </section>

        <section id="sec-bagi-hasil" class="hidden p-4 pb-20">
            <h2 class="font-bold mb-4">Kalkulator Bagi Hasil</h2>

            <!-- Kalkulator Berbasis Data -->
            <div class="bg-white p-4 rounded-xl shadow-sm space-y-4 mb-8">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Berdasarkan Data Lahan</p>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Pilih Lahan</label>
                    <select id="bagi-lahan-id" class="w-full p-2 border rounded"></select>
                </div>
                <div class="flex gap-2">
                    <div class="w-1/2">
                        <label class="text-xs text-gray-500 block mb-1">Tanggal Mulai</label>
                        <input type="date" id="bagi-start" class="w-full p-2 border rounded text-xs"
                            onchange="hitungBagiHasil()">
                    </div>
                    <div class="w-1/2">
                        <label class="text-xs text-gray-500 block mb-1">Tanggal Akhir</label>
                        <input type="date" id="bagi-end" class="w-full p-2 border rounded text-xs"
                            onchange="hitungBagiHasil()">
                    </div>
                </div>
                <div class="flex gap-2">
                    <div class="w-1/2">
                        <label class="text-xs text-gray-500 block mb-1">% Pemilik</label>
                        <input type="number" id="persen-pemilik" placeholder="50" class="w-full p-2 border rounded">
                    </div>
                    <div class="w-1/2">
                        <label class="text-xs text-gray-500 block mb-1">% Penggarap</label>
                        <input type="number" id="persen-penggarap" placeholder="50" class="w-full p-2 border rounded">
                    </div>
                </div>
                <button onclick="hitungBagiHasil()" class="w-full bg-blue-600 text-white py-2 rounded-lg">Hitung
                    Pembagian</button>
                <div id="hasil-kalkulasi" class="p-3 bg-gray-100 rounded-lg hidden"></div>
            </div>

            <!-- Kalkulator Manual -->
            <div class="bg-white p-4 rounded-xl shadow-sm space-y-4">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Kalkulator Manual (Cepat)</p>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Total Pemasukan (Rp)</label>
                    <input type="text" id="manual-pemasukan" placeholder="Contoh: 5.000.000"
                        class="w-full p-2 border rounded" oninput="formatRupiah(this)">
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Total Pengeluaran (Rp)</label>
                    <input type="text" id="manual-pengeluaran" placeholder="Contoh: 2.000.000"
                        class="w-full p-2 border rounded" oninput="formatRupiah(this)">
                </div>
                <div class="flex gap-2">
                    <div class="w-1/2">
                        <label class="text-xs text-gray-500 block mb-1">% Pemilik</label>
                        <input type="number" id="manual-persen-pemilik" placeholder="50"
                            class="w-full p-2 border rounded" value="50">
                    </div>
                    <div class="w-1/2">
                        <label class="text-xs text-gray-500 block mb-1">% Penggarap</label>
                        <input type="number" id="manual-persen-penggarap" placeholder="50"
                            class="w-full p-2 border rounded" value="50">
                    </div>
                </div>
                <button onclick="hitungBagiHasilManual()"
                    class="w-full bg-emerald-600 text-white py-2 rounded-lg font-bold">Hitung Cepat</button>
                <div id="hasil-kalkulasi-manual" class="p-3 bg-gray-100 rounded-lg hidden"></div>
            </div>
        </section>

        <section id="sec-utang" class="hidden p-4">
            <h2 class="font-bold mb-4">Daftar Utang / Kasbon</h2>
            <form id="form-utang" class="bg-white p-4 rounded-xl shadow-sm space-y-3 mb-4">
                <input type="hidden" id="utang-edit-id">
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Tanggal</label>
                    <input type="date" id="utang-date" class="w-full p-2 border rounded" required>
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Nama Pembeli/Buruh</label>
                    <input type="text" id="nama-orang" placeholder="Contoh: Budi" class="w-full p-2 border rounded"
                        required>
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Jumlah Utang (Rp)</label>
                    <input type="text" id="utang-amount" placeholder="Contoh: 200.000" class="w-full p-2 border rounded"
                        oninput="formatRupiah(this)" required>
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Jenis Utang</label>
                    <input type="text" id="utang-type" placeholder="Contoh: Beli Pupuk, Upah Kerja" class="w-full p-2 border rounded" required>
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Keterangan</label>
                    <input type="text" id="utang-desc" placeholder="Opsional" class="w-full p-2 border rounded">
                </div>
                <div class="flex gap-2">
                    <button type="submit" id="btn-save-utang"
                        class="flex-1 bg-orange-500 text-white py-2 rounded-lg">Catat Utang</button>
                    <button type="button" onclick="batalEditUtang()" id="btn-cancel-utang"
                        class="hidden flex-1 bg-gray-500 text-white py-2 rounded-lg">Batal Edit</button>
                </div>
            </form>
            <div id="list-utang" class="space-y-2"></div>
        </section>

        <section id="sec-settings" class="hidden p-4">
            <h2 class="font-bold mb-4">Pengaturan</h2>
            <div class="bg-white p-4 rounded-xl shadow-sm space-y-3">
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Apps Script URL</label>
                    <input type="text" id="sheet-url" placeholder="https://script.google.com/..."
                        class="w-full p-2 border rounded text-xs">
                </div>
                <button onclick="saveSettings()" class="w-full bg-gray-800 text-white py-2 rounded-lg text-sm">Simpan
                    Konfigurasi</button>
                <button onclick="forceDownload()"
                    class="w-full bg-red-100 text-red-600 py-2 rounded-lg text-xs mt-10">Force Download (Overwrite
                    Lokal)</button>
            </div>
        </section>

    </div>

    <nav
        class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center h-16 max-w-md mx-auto z-50 text-[10px] uppercase text-gray-500">
        <button onclick="showSection('home')" id="nav-home"
            class="flex-1 flex flex-col items-center active-tab">🏠<span>Beranda</span></button>
        <button onclick="showSection('lahan')" id="nav-lahan"
            class="flex-1 flex flex-col items-center">🗺️<span>Lahan</span></button>
        <button onclick="showSection('bagi-hasil')" id="nav-bagi-hasil"
            class="flex-1 flex flex-col items-center">⚖️<span>Bagi Hasil</span></button>
        <button onclick="showSection('utang')" id="nav-utang"
            class="flex-1 flex flex-col items-center">📓<span>Utang</span></button>
        <button onclick="showSection('settings')" id="nav-settings"
            class="flex-1 flex flex-col items-center">⚙️<span>Set</span></button>
    </nav>

    <script src="app.js"></script>
    <script>
        // Format number with thousand separator for display
        function formatRupiah(input) {
            let value = input.value.replace(/[^\d]/g, '');
            if (value) {
                input.value = parseInt(value).toLocaleString('id-ID');
            }
        }

        // Get numeric value from formatted input
        function getNumericValue(input) {
            return parseInt(input.value.replace(/[^\d]/g, '')) || 0;
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>

</html>
